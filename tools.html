<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Herramientas | AGweb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo">AGweb</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="temu.html">Ofertas</a>
        <a href="about.html">Sobre mí</a>
    </nav>
</header>

<section class="tools-section" id="qr-generator">
    <h2>🔗 Generador QR</h2>
    <input type="text" id="qr-text" placeholder="Escribe la URL">
    <input type="color" id="qr-color" value="#000000">
    <input type="color" id="qr-bg" value="#ffffff">
    <button onclick="generateQR()">Generar QR</button>
    <div id="qr-result"></div>
</section>

<section class="tools-section" id="timer">
    <h2>⏱ Temporizador</h2>
    <input type="number" id="timer-minutes" placeholder="Minutos">
    <button onclick="startTimer()">Iniciar</button>
    <div id="timer-display">00:00</div>
</section>

<section class="tools-section" id="word-counter">
    <h2>📝 Contador de Palabras</h2>
    <textarea id="word-text" placeholder="Escribe tu texto aquí..."></textarea>
    <button onclick="countWords()">Contar Palabras</button>
    <div id="word-result">0 palabras</div>
</section>

<footer>
    <p>© 2025 AGweb</p>
    <p>Contacto: <a href="mailto:alejandrogarcia12345678910e@gmail.com">alejandrogarcia12345678910e@gmail.com</a></p>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
</body>
</html>
