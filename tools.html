<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Herramientas | AGweb</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">AGweb</div>

<nav>
<a href="index.html">Inicio</a>
<a href="tools.html">Herramientas</a>
<a href="temu.html">Ofertas</a>
<a href="about.html">Sobre mí</a>
</nav>

</header>

<div class="tools-container">

<div class="tool-box">

<h2>QR Generator</h2>

<input id="qr-text" placeholder="Introduce URL">

<input type="color" id="qr-color" value="#000000">

<input type="number" id="qr-size" value="200">

<button onclick="generateQR()">Generar QR</button>

<div id="qr-result"></div>

<button onclick="downloadQR()">Descargar</button>

</div>

<div class="tool-box">

<h2>Temporizador</h2>

<input type="number" id="minutes" placeholder="Minutos">

<h3 id="timer-display">00:00</h3>

<div class="progress-bar">
<div id="progress"></div>
</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>

</div>

<div class="tool-box">

<h2>Word Counter</h2>

<textarea id="text-input" placeholder="Escribe texto"></textarea>

<p>Palabras: <span id="words">0</span></p>
<p>Caracteres: <span id="chars">0</span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
