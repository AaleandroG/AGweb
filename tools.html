<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Herramientas online | AGweb</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">AGweb</div>

<nav>
<a href="index.html">Inicio</a>
<a href="tools.html">Herramientas</a>
<a href="temu.html">Ofertas</a>
<a href="about.html">Sobre mí</a>
</nav>

</header>

<div class="tools-container">

<!-- QR GENERATOR -->

<div class="tool-box">

<h2>QR Generator PRO</h2>

<input id="qr-text" placeholder="Introduce URL">

<input type="color" id="qr-color" value="#000000">

<input type="number" id="qr-size" value="200">

<button onclick="generateQR()">Generar QR</button>

<div id="qr-result"></div>

<button onclick="downloadQR()">Descargar QR</button>

</div>

<!-- TIMER -->

<div class="tool-box">

<h2>Temporizador PRO</h2>

<input type="number" id="minutes" placeholder="Minutos">

<h3 id="timer-display">00:00</h3>

<div class="progress-bar">
<div id="progress"></div>
</div>

<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
<button onclick="addTime()">+10s</button>
<button onclick="removeTime()">-10s</button>

</div>

<!-- WORD COUNTER -->

<div class="tool-box">

<h2>Word Counter PRO</h2>

<textarea id="text-input" placeholder="Escribe aquí"></textarea>

<p>Palabras: <span id="words">0</span></p>
<p>Caracteres: <span id="chars">0</span></p>
<p>Sin espacios: <span id="charsNoSpace">0</span></p>
<p>Tiempo lectura: <span id="reading">0</span> min</p>

</div>

<!-- LINK SHORTENER -->

<div class="tool-box">

<h2>Acortador de enlaces</h2>

<input id="long-url" placeholder="Pega tu enlace">

<button onclick="shortLink()">Acortar</button>

<p id="short-result"></p>

</div>

<!-- REMOVE BG -->

<div class="tool-box">

<h2>Eliminar fondo imagen</h2>

<input type="file" id="image-upload">

<p>(Versión básica demostración)</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
